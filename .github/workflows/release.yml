name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            package_name: yaatv-windows-x64
            executable_name: yaatv
            extension: .exe
          - os: ubuntu-latest
            package_name: yaatv-linux-x64
            executable_name: yaatv-linux
            extension: ""
          - os: macos-15-intel
            package_name: yaatv-macos-x64
            executable_name: yaatv-macos
            extension: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" pyinstaller

      - name: Smoke test CLI
        run: |
          yaatv --version
          python -m yaatv --version

      - name: Run tests
        run: python -m pytest

      - name: Prepare FFmpeg release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vendor/bin
          ffprobe_binary_source=""
          ffprobe_binary_checksum=""

          download_checked() {
            local url="$1"
            local output="$2"
            local expected_sha256="$3"
            curl --fail --location --retry 3 --connect-timeout 30 --max-time 600 \
              "$url" \
              -o "$output"
            python - "$output" "$expected_sha256" <<'PY'
          import hashlib
          import sys

          path = sys.argv[1]
          expected = sys.argv[2].lower()
          digest = hashlib.sha256()
          with open(path, "rb") as input_file:
              for chunk in iter(lambda: input_file.read(1024 * 1024), b""):
                  digest.update(chunk)

          actual = digest.hexdigest()
          if actual != expected:
              print(f"{path} checksum mismatch: expected {expected}, got {actual}", file=sys.stderr)
              raise SystemExit(1)
          PY
          }

          case "$RUNNER_OS" in
            Windows)
              ffmpeg_binary_source="$(python - <<'PY'
          from yaatv.cli import WINDOWS_FFMPEG_ARCHIVE_URL

          print(WINDOWS_FFMPEG_ARCHIVE_URL)
          PY
          )"
              ffmpeg_binary_checksum="$(python - <<'PY'
          from yaatv.cli import WINDOWS_FFMPEG_ARCHIVE_SHA256

          print(WINDOWS_FFMPEG_ARCHIVE_SHA256)
          PY
          )"
              {
                echo "The Windows yaatv executable does not bundle FFmpeg or FFprobe."
                echo "Run yaatv --install-ffmpeg to install the app-managed FFmpeg tools."
                echo
                echo "Installer archive source: $ffmpeg_binary_source"
                echo "Installer archive sha256: $ffmpeg_binary_checksum"
                echo "Install path: %LOCALAPPDATA%\\yaatv\\bin"
                echo "Extracted files: ffmpeg.exe, ffprobe.exe"
                echo
                echo "FFmpeg project source: https://git.ffmpeg.org/ffmpeg.git"
                echo "FFmpeg legal information: https://ffmpeg.org/legal.html"
              } > FFMPEG_BUILD_INFO.txt
              ;;
            Linux)
              ffmpeg_binary_source="https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-05-25-14-02/ffmpeg-N-124633-gc79dfd29e6-linux64-gpl.tar.xz"
              ffmpeg_binary_checksum="de58117d6dd2c20e38e66febefe9732b00def28cf580195132478b64e679c8af"
              download_checked "$ffmpeg_binary_source" ffmpeg.tar.xz "$ffmpeg_binary_checksum"
              mkdir ffmpeg-dist
              tar -xf ffmpeg.tar.xz -C ffmpeg-dist --strip-components=1
              cp ffmpeg-dist/bin/ffmpeg vendor/bin/
              cp ffmpeg-dist/bin/ffprobe vendor/bin/
              chmod +x vendor/bin/ffmpeg vendor/bin/ffprobe
              ;;
            macOS)
              ffmpeg_binary_source="https://evermeet.cx/ffmpeg/ffmpeg-8.1.1.zip"
              ffmpeg_binary_checksum="4610988e2f54c243c50da73a09e4e2c36d9bb77546f9aa6c84cb328dcb1a98c1"
              ffprobe_binary_source="https://evermeet.cx/ffmpeg/ffprobe-8.1.1.zip"
              ffprobe_binary_checksum="aeade29dee3c3844e9bcc974f4ae4b29cc4f87994177d77003a8589fa531009e"
              download_checked "$ffmpeg_binary_source" ffmpeg.zip "$ffmpeg_binary_checksum"
              download_checked "$ffprobe_binary_source" ffprobe.zip "$ffprobe_binary_checksum"
              python -m zipfile -e ffmpeg.zip ffmpeg-dist
              python -m zipfile -e ffprobe.zip ffprobe-dist
              cp ffmpeg-dist/ffmpeg vendor/bin/
              cp ffprobe-dist/ffprobe vendor/bin/
              chmod +x vendor/bin/ffmpeg vendor/bin/ffprobe
              ;;
            *)
              echo "Unsupported runner OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

          if [[ "$RUNNER_OS" != "Windows" ]]; then
            suffix=""
            "vendor/bin/ffmpeg${suffix}" -version
            "vendor/bin/ffprobe${suffix}" -version
            {
              echo "yaatv bundles FFmpeg and FFprobe downloaded during the release workflow."
              echo
              echo "Runner OS: $RUNNER_OS"
              echo "Upstream binary source: $ffmpeg_binary_source"
              echo "Upstream binary sha256: $ffmpeg_binary_checksum"
              if [[ -n "$ffprobe_binary_source" ]]; then
                echo "Upstream ffprobe source: $ffprobe_binary_source"
                echo "Upstream ffprobe sha256: $ffprobe_binary_checksum"
              fi
              echo "FFmpeg project source: https://git.ffmpeg.org/ffmpeg.git"
              echo "FFmpeg legal information: https://ffmpeg.org/legal.html"
              echo
              echo "Verified archive checksums:"
              for archive in ffmpeg.zip ffprobe.zip ffmpeg.tar.xz; do
                if [[ -f "$archive" ]]; then
                  python - "$archive" <<'PY'
          import hashlib
          import sys

          path = sys.argv[1]
          digest = hashlib.sha256()
          with open(path, "rb") as input_file:
              for chunk in iter(lambda: input_file.read(1024 * 1024), b""):
                  digest.update(chunk)

          print(f"{digest.hexdigest()}  {path}")
          PY
                fi
              done
              echo
              echo "ffmpeg -version:"
              "vendor/bin/ffmpeg${suffix}" -version
              echo
              echo "ffprobe -version:"
              "vendor/bin/ffprobe${suffix}" -version
            } > FFMPEG_BUILD_INFO.txt
          fi

      - name: Build executable
        shell: bash
        run: |
          python -c "from pathlib import Path; Path('yaatv_launcher.py').write_text('from yaatv.cli import main\nraise SystemExit(main())\n', encoding='utf-8')"
          suffix=""
          separator=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            suffix=".exe"
            separator=";"
          fi
          pyinstaller_args=(
            --onefile
            --name "${{ matrix.executable_name }}"
            --exclude-module numpy
            --add-data "THIRD_PARTY_NOTICES.md${separator}."
            --add-data "FFMPEG_BUILD_INFO.txt${separator}."
          )
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            pyinstaller_args+=(
              --add-binary "vendor/bin/ffmpeg${suffix}${separator}bin"
              --add-binary "vendor/bin/ffprobe${suffix}${separator}bin"
            )
          fi
          python -m PyInstaller "${pyinstaller_args[@]}" yaatv_launcher.py

      - name: Smoke test executable
        shell: bash
        run: |
          executable="dist/${{ matrix.executable_name }}${{ matrix.extension }}"
          python - <<'PY'
          import math
          import struct
          import wave

          duration = 3
          sample_rate = 48000
          frame_count = duration * sample_rate
          with wave.open("smoke-audio.wav", "wb") as audio:
              audio.setnchannels(2)
              audio.setsampwidth(2)
              audio.setframerate(sample_rate)
              frames = bytearray()
              for index in range(frame_count):
                  sample = int(32767 * 0.2 * math.sin(2 * math.pi * 440 * index / sample_rate))
                  packed = struct.pack("<h", sample)
                  frames.extend(packed)
                  frames.extend(packed)
              audio.writeframes(frames)
          PY
          chmod +x "$executable"
          "$executable" --version
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mkdir -p smoke-localappdata
            export LOCALAPPDATA="$(cygpath -w "$PWD/smoke-localappdata")"
            "$executable" --install-ffmpeg
          fi
          "$executable" \
            --audio smoke-audio.wav \
            --image docs/docs-assets/yaatv-sample.jpg \
            --output smoke-output.mp4 \
            --resolution 1080p \
            --no-warn

      - name: Package release ZIP
        shell: bash
        run: |
          set -euo pipefail
          package_dir="package/${{ matrix.package_name }}"
          executable="dist/${{ matrix.executable_name }}${{ matrix.extension }}"
          mkdir -p "$package_dir" release-assets
          cp "$executable" "$package_dir/"
          cp LICENSE THIRD_PARTY_NOTICES.md FFMPEG_BUILD_INFO.txt "$package_dir/"
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path("package") / "${{ matrix.package_name }}"
          output = Path("release-assets") / "${{ matrix.package_name }}.zip"
          with ZipFile(output, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.iterdir()):
                  if path.is_file():
                      archive.write(path, path.name)
          PY

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: release-assets/${{ matrix.package_name }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --generate-notes --title "$TAG_NAME"
          fi
