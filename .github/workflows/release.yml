name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: yaatv-windows-x64
            extension: .exe
          - os: ubuntu-latest
            asset_name: yaatv-linux-x64
            extension: ""
          - os: macos-15-intel
            asset_name: yaatv-macos-x64
            extension: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" pyinstaller

      - name: Smoke test CLI
        run: |
          yaatv --version
          python -m yaatv --version

      - name: Run tests
        run: python -m pytest

      - name: Build executable
        shell: bash
        run: |
          python -c "from pathlib import Path; Path('yaatv_launcher.py').write_text('from yaatv.cli import main\nraise SystemExit(main())\n', encoding='utf-8')"
          python -m PyInstaller --onefile --name "${{ matrix.asset_name }}" yaatv_launcher.py

      - name: Smoke test executable
        shell: bash
        run: |
          executable="dist/${{ matrix.asset_name }}${{ matrix.extension }}"
          chmod +x "$executable"
          "$executable" --version

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}${{ matrix.extension }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --generate-notes --title "$TAG_NAME"
          fi
