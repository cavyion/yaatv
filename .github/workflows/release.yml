name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            package_name: yaatv-windows-x64
            executable_name: yaatv
            extension: .exe
          - os: ubuntu-latest
            package_name: yaatv-linux-x64
            executable_name: yaatv-linux
            extension: ""
          - os: macos-15-intel
            package_name: yaatv-macos-x64
            executable_name: yaatv-macos
            extension: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $package_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" pyinstaller

      - name: Smoke test CLI
        run: |
          yaatv --version
          python -m yaatv --version

      - name: Run tests
        run: python -m pytest

      - name: Prepare FFmpeg release notes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > FFMPEG_BUILD_INFO.txt
          import os

          from yaatv.cli import (
              LINUX_FFMPEG_ARCHIVE_SHA256,
              LINUX_FFMPEG_ARCHIVE_URL,
              MACOS_FFMPEG_ARCHIVE_SHA256,
              MACOS_FFMPEG_ARCHIVE_URL,
              MACOS_FFPROBE_ARCHIVE_SHA256,
              MACOS_FFPROBE_ARCHIVE_URL,
              WINDOWS_FFMPEG_ARCHIVE_SHA256,
              WINDOWS_FFMPEG_ARCHIVE_URL,
          )

          runner_os = os.environ["RUNNER_OS"]

          print("The yaatv release executable does not bundle FFmpeg or FFprobe.")
          print("Run yaatv --install-ffmpeg to install the app-managed FFmpeg tools.")
          print()
          print(f"Runner OS: {runner_os}")

          if runner_os == "Windows":
              print(f"Installer archive source: {WINDOWS_FFMPEG_ARCHIVE_URL}")
              print(f"Installer archive sha256: {WINDOWS_FFMPEG_ARCHIVE_SHA256}")
              print(r"Install path: %LOCALAPPDATA%\yaatv\bin")
              print("Extracted files: ffmpeg.exe, ffprobe.exe")
          elif runner_os == "Linux":
              print(f"Installer archive source: {LINUX_FFMPEG_ARCHIVE_URL}")
              print(f"Installer archive sha256: {LINUX_FFMPEG_ARCHIVE_SHA256}")
              print("Install path: $XDG_DATA_HOME/yaatv/bin, or ~/.local/share/yaatv/bin")
              print("Extracted files: ffmpeg, ffprobe")
          elif runner_os == "macOS":
              print(f"Installer ffmpeg source: {MACOS_FFMPEG_ARCHIVE_URL}")
              print(f"Installer ffmpeg sha256: {MACOS_FFMPEG_ARCHIVE_SHA256}")
              print(f"Installer ffprobe source: {MACOS_FFPROBE_ARCHIVE_URL}")
              print(f"Installer ffprobe sha256: {MACOS_FFPROBE_ARCHIVE_SHA256}")
              print("Install path: ~/Library/Application Support/yaatv/bin")
              print("Extracted files: ffmpeg, ffprobe")
          else:
              raise SystemExit(f"Unsupported runner OS: {runner_os}")

          print()
          print("FFmpeg project source: https://git.ffmpeg.org/ffmpeg.git")
          print("FFmpeg legal information: https://ffmpeg.org/legal.html")
          PY

      - name: Build executable
        shell: bash
        run: |
          python -c "from pathlib import Path; Path('yaatv_launcher.py').write_text('from yaatv.cli import main\nraise SystemExit(main())\n', encoding='utf-8')"
          separator=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            separator=";"
          fi
          pyinstaller_args=(
            --onefile
            --name "${{ matrix.executable_name }}"
            --exclude-module numpy
            --add-data "THIRD_PARTY_NOTICES.md${separator}."
            --add-data "FFMPEG_BUILD_INFO.txt${separator}."
          )
          python -m PyInstaller "${pyinstaller_args[@]}" yaatv_launcher.py

      - name: Smoke test executable
        shell: bash
        run: |
          executable="dist/${{ matrix.executable_name }}${{ matrix.extension }}"
          python - <<'PY'
          import math
          import struct
          import wave

          duration = 3
          sample_rate = 48000
          frame_count = duration * sample_rate
          with wave.open("smoke-audio.wav", "wb") as audio:
              audio.setnchannels(2)
              audio.setsampwidth(2)
              audio.setframerate(sample_rate)
              frames = bytearray()
              for index in range(frame_count):
                  sample = int(32767 * 0.2 * math.sin(2 * math.pi * 440 * index / sample_rate))
                  packed = struct.pack("<h", sample)
                  frames.extend(packed)
                  frames.extend(packed)
              audio.writeframes(frames)
          PY
          chmod +x "$executable"
          "$executable" --version
          case "$RUNNER_OS" in
            Windows)
              mkdir -p smoke-localappdata
              export LOCALAPPDATA="$(cygpath -w "$PWD/smoke-localappdata")"
              ;;
            Linux)
              mkdir -p smoke-xdg-data
              export XDG_DATA_HOME="$PWD/smoke-xdg-data"
              ;;
            macOS)
              mkdir -p smoke-home
              export HOME="$PWD/smoke-home"
              ;;
            *)
              echo "Unsupported runner OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac
          "$executable" --install-ffmpeg
          "$executable" \
            --audio smoke-audio.wav \
            --image docs/docs-assets/yaatv-sample.jpg \
            --output smoke-output.mp4 \
            --resolution 1080p \
            --no-warn

      - name: Package release ZIP
        shell: bash
        run: |
          set -euo pipefail
          package_dir="package/${{ matrix.package_name }}"
          executable="dist/${{ matrix.executable_name }}${{ matrix.extension }}"
          mkdir -p "$package_dir" release-assets
          cp "$executable" "$package_dir/"
          cp LICENSE THIRD_PARTY_NOTICES.md FFMPEG_BUILD_INFO.txt "$package_dir/"
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path("package") / "${{ matrix.package_name }}"
          output = Path("release-assets") / "${{ matrix.package_name }}.zip"
          with ZipFile(output, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.iterdir()):
                  if path.is_file():
                      archive.write(path, path.name)
          PY

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: release-assets/${{ matrix.package_name }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --generate-notes --title "$TAG_NAME"
          fi
